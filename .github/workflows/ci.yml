name: CI

on:
  pull_request:
    branches: ["main"] 
  push:
    branches: ["dev", "develop", "test", "main"] # main will be removed

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: abatilo/actions-poetry@v4
      - name: Setup a local virtual environment (if no poetry.toml file)
        run: |
          poetry config virtualenvs.create true --local
          poetry config virtualenvs.in-project true --local
      - uses: actions/cache@v3
        name: Define a cache for the virtual environment based on the dependencies lock file
        with:
          path: ./.venv
          key: venv-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install

      - name: Install pytest-cov and coverage
        run: poetry add --dev pytest-cov coverage

      - name: Run pytest with coverage
        run: poetry run pytest --cov=src/nuqulib --cov-report=xml --cov-report=term -s

      - name: Upload coverage to GitHub summary
        if: github.event_name == 'pull_request'
        run: |
          COVERAGE=$(grep -A 1 'Name.*Stmts' coverage.xml | tail -n 1 | grep -oP 'percent=\"\K[0-9.]+')
          echo "## Coverage: $COVERAGE%" >> $GITHUB_STEP_SUMMARY

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          message: |
            $(poetry run coverage report --format=markdown)
